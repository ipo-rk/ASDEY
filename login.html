<!DOCTYPE html>
<html lang="id" x-data="loginApp" :class="{ 'dark': darkMode }">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — SIMASRA Asrama Deiyai Jayapura</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Login CSS (font import ada di dalam file ini) -->
    <link rel="stylesheet" href="asset/css/login.css">
</head>

<body>

    <!-- ── Cinematic Background ── -->
    <div class="scene">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="page-wrap">

        <!-- ── Topbar ── -->
        <header class="topbar">
            <div class="topbar-brand">
                <img src="asset/img/logo-login.png" alt="Logo ASDEI" class="topbar-logo">
                <div>
                    <div class="topbar-title">ASRAMA DEIYAI</div>
                    <div class="topbar-sub">Kab. Deiyai &middot; Kota Studi Jayapura</div>
                </div>
            </div>
            <button class="toggle-btn" @click="toggleDarkMode()" :title="darkMode ? 'Mode Terang' : 'Mode Gelap'">
                <i x-show="!darkMode" class="fas fa-moon"></i>
                <i x-show="darkMode" class="fas fa-sun" style="color:#fbbf24"></i>
            </button>
        </header>

        <!-- ── Main ── -->
        <main class="main-area">
            <div class="card">

                <!-- LEFT: Brand Panel -->
                <div class="brand-panel">
                    <div class="logo-ring">
                        <img src="asset/img/logo-login.png" alt="Logo ASDEI">
                    </div>
                    <div class="brand-name">ASDEI</div>
                    <div class="brand-line"></div>
                    <div class="brand-desc">
                        Asrama Mahasiswa<br>
                        Kabupaten Deiyai<br>
                        Kota Studi Jayapura
                    </div>
                    <div class="brand-chip">
                        <i class="fas fa-shield-halved"></i>SIMASRA v2.0
                    </div>
                </div>

                <!-- RIGHT: Form Panel -->
                <div class="form-panel">

                    <div class="f-heading fu">Selamat Datang &#128075;</div>
                    <div class="f-sub fu d1">Masuk ke panel administrasi asrama</div>

                    <!-- Error Message -->
                    <div x-show="errorMessage" x-transition class="err-box">
                        <i class="fas fa-circle-exclamation"></i>
                        <span x-text="errorMessage"></span>
                    </div>

                    <!-- Username -->
                    <div class="f-field fu d2">
                        <label class="f-label">Username / Email</label>
                        <div class="f-input-wrap">
                            <input type="text" x-model="form.username" required autofocus
                                placeholder="Masukkan username atau email">
                            <span class="f-icon"><i class="fas fa-user"></i></span>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="f-field fu d3">
                        <label class="f-label">Kata Sandi</label>
                        <div class="f-input-wrap">
                            <input :type="showPassword ? 'text' : 'password'" x-model="form.password" required
                                placeholder="Masukkan kata sandi">
                            <button type="button" class="f-icon btn" @click="showPassword = !showPassword">
                                <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="rem-row fu d4">
                        <input type="checkbox" x-model="form.remember" id="remember">
                        <label for="remember">Ingat saya</label>
                    </div>

                    <!-- Submit -->
                    <button class="btn-submit fu d5" @click="handleLogin" :disabled="loading">
                        <template x-if="!loading">
                            <span style="display:flex;align-items:center;gap:8px;position:relative;">
                                <i class="fas fa-right-to-bracket"></i>
                                Masuk ke Dashboard
                            </span>
                        </template>
                        <template x-if="loading">
                            <span style="display:flex;align-items:center;gap:10px;">
                                <span class="spin-ring"></span>
                                Memproses...
                            </span>
                        </template>
                    </button>

                    <!-- Footer Links -->
                    <div class="f-footer fu d6">
                        <a href="#">Lupa kata sandi?</a>
                        <span>&middot;</span>
                        <a href="#">Hubungi Admin</a>
                    </div>

                </div>
                <!-- /form-panel -->

            </div>
            <!-- /card -->
        </main>

    </div>
    <!-- /page-wrap -->

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginApp', () => ({
                darkMode:
                    localStorage.theme === 'dark' ||
                    (!('theme' in localStorage) &&
                        window.matchMedia('(prefers-color-scheme: dark)').matches),
                showPassword: false,
                loading: false,
                errorMessage: '',
                form: {
                    username: localStorage.getItem('rememberedUser') || '',
                    password: '',
                    remember: !!localStorage.getItem('rememberedUser'),
                },

                init() {
                    this.applyDark();
                },

                applyDark() {
                    document.documentElement.classList.toggle('dark', this.darkMode);
                    localStorage.theme = this.darkMode ? 'dark' : 'light';
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    this.applyDark();
                },

                async handleLogin() {
                    this.errorMessage = '';

                    if (!this.form.username.trim() || !this.form.password.trim()) {
                        this.errorMessage = 'Username dan kata sandi harus diisi.';
                        return;
                    }

                    this.loading = true;
                    await new Promise(r => setTimeout(r, 1000));

                    const users = {
                        admin: 'simasra2026',
                        pengurus: 'deiyai2026',
                    };

                    const u = this.form.username.trim().toLowerCase();
                    const p = this.form.password.trim();

                    if (users[u] && users[u] === p) {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('loggedInUser', u);
                        this.form.remember
                            ? localStorage.setItem('rememberedUser', u)
                            : localStorage.removeItem('rememberedUser');

                        await Swal.fire({
                            title: 'Login Berhasil!',
                            text: `Selamat datang kembali, ${u}!`,
                            icon: 'success',
                            timer: 1400,
                            showConfirmButton: false,
                            allowOutsideClick: false,
                            allowEscapeKey: false,
                        });

                        window.location.replace('index.html');
                    } else {
                        this.errorMessage = 'Username atau kata sandi salah.';
                    }

                    this.loading = false;
                },
            }));
        });
    </script>

</body>

</html>
